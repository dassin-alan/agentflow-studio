name: Feature Request
description: Suggest an idea for AgentFlow.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or limitation you're facing.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: How big is this change?
      options:
        - "Small — tweak to existing feature"
        - "Medium — new feature or refactor"
        - "Large — new subsystem or breaking change"
    validations:
      required: true

  - type: checkboxes
    id: willing
    attributes:
      label: Would you be willing to contribute this?
      options:
        - label: I'd be willing to open a PR for this.
